name: Backend CI/CD (Self-Hosted)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Test and Deploy on EC2
    runs-on: [self-hosted, Linux, X64]

    strategy:
      matrix:
        node-version: [22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Stop existing PM2 apps
        run: |
          pm2 stop all || true
          pm2 delete all || true

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run backend tests
        working-directory: ./backend
        run: npm test

      - name: Create backend .env from GitHub secrets
        working-directory: ./backend
        run: |
          cat > .env << EOF
          MONGO_URI=${{ secrets.MONGO_URI }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          PORT=${{ secrets.PORT }}
          EOF

      - name: Start backend with PM2
        run: pm2 start "npm --prefix backend run start" --name backend

      - name: Install frontend dependencies and build
        working-directory: ./frontend
        run: |
          npm ci
          rm -rf ./build
          npm run build

      - name: Start frontend with PM2
        run: pm2 serve frontend/build 3000 --name frontend --spa

      - name: Save PM2 process list
        run: pm2 save

      - name: Show PM2 status
        run: pm2 status
